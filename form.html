<!DOCTYPE html>
<html lang="en" US>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FORM PAGE</title>
    </head>

    <body>
        <h1>FORM PAGE</h1>
        <form method="POST">
            <fieldset>
                <label for="firstname">Firstname:</label><input type="text" id="firstname" name="Firstname" placeholder="Enter your first name"><br>
                <br>
                <label for="lastname">Lastname:</label><input type="text" id="lastname" name="Lastname" placeholder="Enter your last name"><br>

                <br>
                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="Male" title="Select if male"><label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="Female" title="Select if female"><label for="female">Female</label>
                <br>


                <br>
                <label for="state">State of Origin:</label>
                <select id="state" name="State of Origin" title="Select your state of origin">
                    <option>Lagos</option>
                    <option>Abuja</option>
                    <option>Ogun</option>
                    <option>Rivers</option>
                    <option>Enugu</option>
                    <option>Port Harcourt</option>
                </select>

                <br>

                <br>
                <label for="notes">Notes:</label>
                <textarea id="notes" name="Notes" cols="100" rows="10" placeholder="Enter any additional notes here" title="Enter any additional information"></textarea>
        
                <br>
                <br>
                <input type="submit" value="submit" title="Submit the form">
            </fieldset> 
        </form>


        <h2>LIST ITEMS</h2>

        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ol>

        <ul>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ul>

        <dl>
            <dt>First item</dt>
            <dd>This is the first item description</dd>

            <dt>Second item</dt>
            <dd>This is the second item description</dd>

            <dt>Third item</dt>
            <dd>This is the third item description</dd>
        </dl>
    </body>
</html>
