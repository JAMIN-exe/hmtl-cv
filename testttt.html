<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfume Product</title>
    <link rel="stylesheet" href="testttt.css">
</head>
<body>
    <div class="card">
        <div class="card-image">
            <img src="images\image 27.png" alt="perfume">
        </div>
        
        <div class="card-info">

            <div class="card-icon">
                <img src="images\logo.svg" alt="brand logo" height="60px">
            </div> 
            
            <p class="card-name">Perfume</p>

            <h2 class="card-title">Be perceived<br>before you are<br>seen</h2>

            <p class="card-description">We want you to always smell your best at all 
                times<br>and this is our vision when we set out to be a perfume brand..<br> 
                This is our latest collection and it is for the men and women.
            </p>

            <p class="card-price">₦40,000</p>

            <button class="button-cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Add to cart
            </button>
        </div>
    </div>   
</body>
</html>
